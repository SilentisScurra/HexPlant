                return;
            }
            if (isInside(mx, my, UI.retryBtn)) {
                triggerTransition(gameState); // Restart current state
                return;
            }
        }

        // Board Interaction
        let clickedNode = null;
        let minDist = Infinity;
        for (const node of Object.values(hexes)) {
            const centerPx = node.px + 16;
            const centerPy = node.py + 16;
            const dist = (centerPx - mx) ** 2 + (centerPy - my) ** 2;
            if (dist < 256 && dist < minDist) { 
                minDist = dist;
                clickedNode = node;
            }
        }

        if (!clickedNode) {
            selectedNode = null;
            return;
        }

        if (selectedNode) {
            if (clickedNode === selectedNode) {
                selectedNode = null; 
            } else if (isValidTarget(selectedNode, clickedNode)) {
                if (clickedNode.plant) {
                    let mergedTier = selectedNode.plant.tier + 1;
                    if (mergedTier === 7) {
                        clickedNode.plant = { type: 'pillar' };
                        if (gameState === 'PLAY') globalTurns += 3;
                    } else {
                        clickedNode.plant = { type: 'plant', tier: mergedTier, fruit: true };
                    }
                    score += 15;
                    selectedNode.plant = null; 
                } else {
                    clickedNode.plant = { type: 'plant', tier: 1, fruit: false };
                    score += 5;
                    selectedNode.plant.fruit = false;
                }
                
                // Trigger placement animation
                clickedNode.animPlacedStart = Date.now();
                
                selectedNode = null;
                checkPatterns();
                checkTutorialWinStates();
            } else selectedNode = null; 
        } else {
            if (clickedNode.playable && clickedNode.plant && clickedNode.plant.fruit && clickedNode.plant.type !== 'pillar') {
                selectedNode = clickedNode;
            }
        }
    });

    // --- Rendering ---
    function render() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const now = Date.now();

        if (gameState === 'MENU') {
            if (IMAGES['title.png']?.complete) {
                ctx.drawImage(IMAGES['title.png'], 32, 40, 296, 64); 
            }
            
            drawText(`HIGH SCORE: ${highScore}`, 175, 120, '#FFF', 2, 'center');
            
            if (IMAGES['bt_play.png']?.complete) {
                ctx.drawImage(IMAGES['bt_play.png'], UI.playBtn.x, UI.playBtn.y, UI.playBtn.w, UI.playBtn.h);
            }
            if (IMAGES['bt_tutorial.png']?.complete) {
                ctx.drawImage(IMAGES['bt_tutorial.png'], UI.tutBtn.x, UI.tutBtn.y, UI.tutBtn.w, UI.tutBtn.h);
            }
        } else {
            // Gameplay / Tutorial rendering
            for (const key in hexes) {
                const h = hexes[key];
                let imgToDraw = IMAGES[h.file];
                
                // Animated Completion Tile Render
                if (h.completeTimer && now < h.completeTimer && IMAGES['anim_complete.png']?.complete) {
                    let elapsed = 2000 - (h.completeTimer - now);
                    let frame = Math.floor(elapsed / 150) % 3; // 150ms per frame, 3 frames
                    ctx.drawImage(IMAGES['anim_complete.png'], frame * 32, 0, 32, 32, h.px, h.py, 32, 32);
                } else if (imgToDraw?.complete) {
                    if (h.sx !== undefined) ctx.drawImage(imgToDraw, h.sx, h.sy, 32, 32, h.px, h.py, 32, 32);
                    else ctx.drawImage(imgToDraw, h.px, h.py, 32, 32); 
                }
            }

            if (gameState === 'PLAY') {
                ctx.globalAlpha = 0.5;
                shadowItems.forEach(item => {
                    const img = IMAGES[item.file];
                    if (img?.complete) {
                        const w = item.width || item.w || img.width || 32;
                        const h = item.height || item.h || img.height || 32;
                        ctx.drawImage(img, item.sx || 0, item.sy || 0, w, h, cx + item.globalX, cy + item.globalY, w, h);
                    }
                });
                ctx.globalAlpha = 1.0;
            }

            for (const key in hexes) {
                const h = hexes[key];
                if (selectedNode && (selectedNode === h || (h.playable && isValidTarget(selectedNode, h)))) {
                    if (IMAGES['highlighttile.png']?.complete) ctx.drawImage(IMAGES['highlighttile.png'], h.px, h.py, 32, 32);
                }
            }

            for (const key in hexes) {
                const h = hexes[key];
                if (h.plant) {
                    if (h.plant.type === 'pillar' && IMAGES['pillar.png']?.complete) {
                        ctx.drawImage(IMAGES['pillar.png'], h.px, h.py, 32, 32);
                    } else if (h.plant.type === 'plant') {
                        const sprite = IMAGES[`plant_${h.plant.tier}.png`];
                        if (sprite?.complete) {
                            const sourceX = h.plant.fruit ? 0 : 32;
                            ctx.drawImage(sprite, sourceX, 0, 32, 32, h.px, h.py, 32, 32);
                        }
                    }
                }
                
                // Animated Placed Tile Render (Draws over the plant)
                if (h.animPlacedStart && IMAGES['anim_planted.png']?.complete) {
                    let elapsed = now - h.animPlacedStart;
                    let frame = Math.floor(elapsed / 50); // 100ms per frame
                    if (frame < 5) {
                        ctx.drawImage(IMAGES['anim_planted.png'], frame * 32, 0, 32, 32, h.px, h.py, 32, 32);
                    }
                }
            }

            if (gameState === 'PLAY') {
                propItems.forEach(item => {
                    const img = IMAGES[item.file];
                    if (img?.complete) {
                        const w = item.width || item.w || img.width || 32;
                        const h = item.height || item.h || img.height || 32;
                        ctx.drawImage(img, item.sx || 0, item.sy || 0, w, h, cx + item.globalX, cy + item.globalY, w, h);
                    }
                });
            }

            // In-Game UI
            if (gameState === 'PLAY' || gameState === 'TUTORIAL_3') {
                drawText(`Turns:${globalTurns}`, 10, 10, '#FFF', 1);
                
                // Draw End Turn & Retry Buttons
                if (IMAGES['endturn.png']?.complete) {
                    ctx.drawImage(IMAGES['endturn.png'], UI.endBtn.x, UI.endBtn.y, UI.endBtn.w, UI.endBtn.h);
                }
                if (IMAGES['bt_retry.png']?.complete) {
                    ctx.drawImage(IMAGES['bt_retry.png'], UI.retryBtn.x, UI.retryBtn.y, UI.retryBtn.w, UI.retryBtn.h);
                }
            }
            if (gameState === 'PLAY') {
                drawText(`Score:${score}`, 10, 25, '#FFF', 1);
            }

            if (gameState.startsWith('TUTORIAL') && gameState !== 'TUTORIAL_DONE') {
                drawText(instructionText, 175, 320, '#FFD700', 1, 'center');
            }

            if (currentPattern && gameState === 'PLAY') {
                const anchorQ = -6, anchorR = 5; 
                for (let off of currentPattern.shape.offsets[0]) {
                    const q = anchorQ + off[0], r = anchorR + off[1];
                    const drawX = cx + (q * 32) + (r * 16), drawY = cy + (r * 24);
                    if (IMAGES['inventorytile.png']?.complete) ctx.drawImage(IMAGES['inventorytile.png'], drawX, drawY, 32, 32);
                    const sprite = IMAGES[`plant_${currentPattern.tier}.png`];
                    if (sprite?.complete) ctx.drawImage(sprite, 0, 0, 32, 32, drawX, drawY, 32, 32);
                }
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ctx.globalAlpha = Math.max(0, ft.alpha);
                drawText(ft.text, ft.x, ft.y, '#55FF55', 1, 'center');
                ctx.globalAlpha = 1.0;
                ft.y -= 0.5; ft.alpha -= 0.015; ft.life--;
                if (ft.life <= 0) floatingTexts.splice(i, 1);
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawText("GAME OVER", 175, 120, '#FF0000', 3, 'center');
                drawText(`SCORE: ${score}`, 175, 160, '#FFFFFF', 2, 'center');
                                
                if (IMAGES['bt_restart.png']?.complete) {
                    ctx.drawImage(IMAGES['bt_restart.png'], UI.restartBtn.x, UI.restartBtn.y, UI.restartBtn.w, UI.restartBtn.h);
                }
            }

            if (gameState === 'TUTORIAL_DONE') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                drawText("TUTORIAL COMPLETE!", 175, 160, '#55FF55', 2, 'center');
            }
        }

        if (transitionTarget !== null) {
            transitionAlpha += 0.05;
            if (transitionAlpha >= 1) {
                transitionAlpha = 1;
                executeTransition();
            }
        } else if (transitionAlpha > 0) {
            transitionAlpha -= 0.05;
            if (transitionAlpha < 0) transitionAlpha = 0;
        }

        if (transitionAlpha > 0) {
            ctx.fillStyle = `rgba(0,0,0,${transitionAlpha})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    function gameLoop() {
        render();
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
